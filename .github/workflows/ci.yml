name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Build first so each package's dist/.d.ts exists. Downstream packages
      # (provider-twilio, store-postgres, store-mongo) import types from
      # @jadedm/nestjs-verify via its package.json "types" field, which
      # points at dist/index.d.ts.
      - run: pnpm build
      - run: pnpm typecheck
      - run: pnpm test
